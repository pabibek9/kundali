<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janam Kundali Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Leaflet.js Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e003b 0%, #3a0ca3 50%, #4361ee 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 300px;
        }

        h1, h2 {
            margin-top: 0;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #ddd;
        }

        input[type="text"], input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: #4cc9f0;
        }

        /* Autocomplete styles */
        .autocomplete-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 0, 59, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .autocomplete-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #f72585;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn:hover {
            background: #b5179e;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* SVG Chart */
        .kundali-chart {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: block;
        }

        .k-line {
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2;
        }

        .k-text {
            fill: #fff;
            font-size: 14px;
            text-anchor: middle;
            font-weight: 600;
        }

        .k-sign {
            fill: rgba(255, 255, 255, 0.75);
            font-size: 16px;
            text-anchor: middle;
            font-weight: bold;
        }
        
        .k-asc {
            fill: #f72585;
            font-weight: bold;
        }

        #results {
            display: none;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<script>
    // Location Autocomplete Logic
    const searchInput = document.getElementById('place_search');
    const resultsDiv = document.getElementById('place_results');
    const latInput = document.getElementById('lat');
    const lonInput = document.getElementById('lon');
    const placeNameInput = document.getElementById('place_name');
    let searchTimeout;

    // Leaflet Map Variables & Setup
    let map, marker;
    function initMap(lat, lon, address) {
        document.getElementById('map').style.display = 'block';
        const parsedLat = parseFloat(lat);
        const parsedLon = parseFloat(lon);

        if (!map) {
            map = L.map('map').setView([parsedLat, parsedLon], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            marker = L.marker([parsedLat, parsedLon], { draggable: true }).addTo(map);

            // Handle marker drag
            marker.on('dragend', function() {
                const pos = marker.getLatLng();
                updateCoordinatesFromMap(pos.lat, pos.lng);
            });

            // Handle map click
            map.on('click', function(e) {
                const pos = e.latlng;
                marker.setLatLng(pos);
                updateCoordinatesFromMap(pos.lat, pos.lng);
            });
        } else {
            map.setView([parsedLat, parsedLon], 12);
            marker.setLatLng([parsedLat, parsedLon]);
            // Force redraw since container might have transitioned from hidden
            setTimeout(() => { map.invalidateSize(); }, 200);
        }
    }

    function updateCoordinatesFromMap(lat, lon) {
        latInput.value = lat;
        lonInput.value = lon;
        
        // Reverse geocoding to display coordinates/address
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
            headers: {
                'User-Agent': 'kundali_web_app'
            }
        })
        .then(res => res.json())
        .then(data => {
            const address = data.display_name || `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
            searchInput.value = address;
            placeNameInput.value = address;
        })
        .catch(() => {
            const address = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
            searchInput.value = address;
            placeNameInput.value = address;
        });
    }

    // Fetch and populate cities list for the selected country
    let activeFetchAbortController = null;
    
    function loadCities(country) {
        const datalist = document.getElementById('city_list');
        const loadingDiv = document.getElementById('city_loading');
        datalist.innerHTML = '';
        
        if (!country || country === 'Nepal' || country === 'separator') {
            loadingDiv.style.display = 'none';
            return;
        }

        loadingDiv.textContent = `Loading cities for ${country}...`;
        loadingDiv.style.display = 'block';

        // Abort previous fetch if user changes country quickly
        if (activeFetchAbortController) {
            activeFetchAbortController.abort();
        }
        activeFetchAbortController = new AbortController();

        fetch('https://countriesnow.space/api/v0.1/countries/cities', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ country: country }),
            signal: activeFetchAbortController.signal
        })
        .then(res => res.json())
        .then(resData => {
            if (!resData.error && resData.data) {
                // Populate datalist options
                const fragment = document.createDocumentFragment();
                resData.data.forEach(city => {
                    const opt = document.createElement('option');
                    opt.value = city;
                    fragment.appendChild(opt);
                });
                datalist.appendChild(fragment);
                loadingDiv.style.display = 'none';
            } else {
                loadingDiv.textContent = 'Failed to load cities list. You can still type manually.';
            }
        })
        .catch(err => {
            if (err.name !== 'AbortError') {
                loadingDiv.textContent = 'Failed to load cities list. You can still type manually.';
                console.error("Failed to load cities:", err);
            }
        });
    }

    let geocodeTimeout;
    function triggerGeocoding(city) {
        clearTimeout(geocodeTimeout);
        const country = countrySelect.value;
        if (!city || !country) return;

        geocodeTimeout = setTimeout(() => {
            const searchQuery = `${city}, ${country}`;
            fetch(`/api/search_location?q=${encodeURIComponent(searchQuery)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.length > 0) {
                        const item = data[0];
                        latInput.value = item.lat;
                        lonInput.value = item.lon;
                        placeNameInput.value = item.address;
                        initMap(item.lat, item.lon, item.address);
                    }
                })
                .catch(err => console.error("Geocoding failed:", err));
        }, 300); // 300ms debounce
    }

    // Trigger geocoding immediately if the typed text matches a datalist option exactly
    searchInput.addEventListener('input', function() {
        const val = this.value;
        const datalist = document.getElementById('city_list');
        const options = datalist.options;
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === val) {
                triggerGeocoding(val);
                break;
            }
        }
    });

    // Also trigger geocoding when the user finishes typing (loses focus)
    searchInput.addEventListener('change', function() {
        triggerGeocoding(this.value);
    });

    // Nepal Location Selector Logic
    const nepalLocations = {
        "Koshi Province": [
            "Bhojpur", "Dhankuta", "Ilam", "Jhapa", "Khotang", "Morang", 
            "Okhaldhunga", "Panchthar", "Sankhuwasabha", "Solukhumbu", 
            "Sunsari", "Taplejung", "Terhathum", "Udayapur"
        ],
        "Madhesh Province": [
            "Bara", "Dhanusha", "Mahottari", "Parsa", "Rautahat", 
            "Saptari", "Sarlahi", "Siraha"
        ],
        "Bagmati Province": [
            "Bhaktapur", "Chitwan", "Dhading", "Dolakha", "Kathmandu", 
            "Kavrepalanchok", "Lalitpur", "Makwanpur", "Nuwakot", 
            "Ramechhap", "Rasuwa", "Sindhuli", "Sindhupalchok"
        ],
        "Gandaki Province": [
            "Baglung", "Gorkha", "Kaski", "Lamjung", "Manang", "Mustang", 
            "Myagdi", "Nawalpur", "Parbat", "Syangja", "Tanahun"
        ],
        "Lumbini Province": [
            "Arghakhanchi", "Banke", "Bardiya", "Dang", "Gulmi", "Kapilvastu", 
            "Parasi", "Palpa", "Pyuthan", "Rolpa", "Rukum East", "Rupandehi"
        ],
        "Karnali Province": [
            "Dailekh", "Dolpa", "Humla", "Jajarkot", "Jumla", "Kalikot", 
            "Mugu", "Rukum West", "Salyan", "Surkhet"
        ],
        "Sudurpashchim Province": [
            "Achham", "Baitadi", "Bajhang", "Bajura", "Dadeldhura", 
            "Darchula", "Doti", "Kailali", "Kanchanpur"
        ]
    };

    const countrySelect = document.getElementById('country_select');
    const provinceSelect = document.getElementById('nepal_province');
    const districtSelect = document.getElementById('nepal_district');
    const globalSearchContainer = document.getElementById('global_search_container');
    const nepalSelectContainer = document.getElementById('nepal_select_container');



    // Handle Country Selection Change
    countrySelect.addEventListener('change', function() {
        const country = this.value;
        
        // Reset coordinate inputs and hidden fields
        latInput.value = "";
        lonInput.value = "";
        placeNameInput.value = "";
        searchInput.value = "";
        provinceSelect.value = "";
        districtSelect.innerHTML = '<option value="">Choose District...</option>';
        districtSelect.setAttribute('disabled', 'disabled');
        document.getElementById('map').style.display = 'none';

        if (country === 'Nepal') {
            globalSearchContainer.style.display = 'none';
            nepalSelectContainer.style.display = 'flex';
            searchInput.removeAttribute('required');
            provinceSelect.setAttribute('required', 'required');
            districtSelect.setAttribute('required', 'required');
        } else if (country && country !== 'separator') {
            globalSearchContainer.style.display = 'block';
            nepalSelectContainer.style.display = 'none';
            searchInput.setAttribute('required', 'required');
            searchInput.placeholder = `Search city in ${country}...`;
            provinceSelect.removeAttribute('required');
            districtSelect.removeAttribute('required');
            loadCities(country);
        } else {
            globalSearchContainer.style.display = 'none';
            nepalSelectContainer.style.display = 'none';
            searchInput.removeAttribute('required');
            provinceSelect.removeAttribute('required');
            districtSelect.removeAttribute('required');
        }
    });

    // Populate districts when province changes
    provinceSelect.addEventListener('change', function() {
        const province = this.value;
        districtSelect.innerHTML = '<option value="">Choose District...</option>';
        if (province && nepalLocations[province]) {
            districtSelect.removeAttribute('disabled');
            nepalLocations[province].forEach(dist => {
                const opt = document.createElement('option');
                opt.value = dist;
                opt.textContent = dist;
                districtSelect.appendChild(opt);
            });
        } else {
            districtSelect.setAttribute('disabled', 'disabled');
        }
    });

    // Fetch coordinates when district is selected
    districtSelect.addEventListener('change', function() {
        const district = this.value;
        const province = provinceSelect.value;
        if (!district || !province) return;

        const searchQuery = `${district}, ${province}, Nepal`;
        
        fetch(`/api/search_location?q=${encodeURIComponent(searchQuery)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const item = data[0];
                    latInput.value = item.lat;
                    lonInput.value = item.lon;
                    placeNameInput.value = item.address;
                    initMap(item.lat, item.lon, item.address);
                } else {
                    // Fallback: try district + Nepal
                    fetch(`/api/search_location?q=${encodeURIComponent(district + ', Nepal')}`)
                        .then(res => res.json())
                        .then(fallbackData => {
                            if (fallbackData.length > 0) {
                                const item = fallbackData[0];
                                latInput.value = item.lat;
                                lonInput.value = item.lon;
                                placeNameInput.value = item.address;
                                initMap(item.lat, item.lon, item.address);
                            }
                        });
                }
            })
            .catch(err => {
                console.error("Geocoding failed for district:", err);
            });
    });

    // Form Submission
    document.getElementById('kundali-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if(!latInput.value) {
            alert("Please search and select a location, or pick a Nepal district.");
            return;
        }

        const payload = {
            name: document.getElementById('name').value,
            calendar_type: document.getElementById('calendar_type').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            lat: latInput.value,
            lon: lonInput.value,
            place_name: placeNameInput.value,
            api_key: "sk-kundali-7f2a8c9d0b5e43"
        };

        document.getElementById('loader').style.display = 'block';
        document.getElementById('results').style.display = 'none';

        fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = 'none';
            if(data.error) {
                alert("Error: " + data.error);
                return;
            }
            renderResults(data);
        })
        .catch(err => {
            document.getElementById('loader').style.display = 'none';
            alert("Network Error");
        });
    });

    function renderResults(data) {
        document.getElementById('results').style.display = 'block';
        
        const nepaliSigns = {
            "Aries": "मेष", "Taurus": "वृष", "Gemini": "मिथुन", "Cancer": "कर्कट",
            "Leo": "सिंह", "Virgo": "कन्या", "Libra": "तुला", "Scorpio": "वृश्चिक",
            "Sagittarius": "धनु", "Capricorn": "मकर", "Aquarius": "कुम्भ", "Pisces": "मीन"
        };

        document.getElementById('res-asc').innerText = nepaliSigns[data.ascendant.sign];
        document.getElementById('res-sun').innerText = nepaliSigns[data.planetary_positions.Sun.sign];
        document.getElementById('res-moon').innerText = nepaliSigns[data.planetary_positions.Moon.sign];
        document.getElementById('res-rashi').innerText = nepaliSigns[data.planetary_positions.Moon.sign];
        document.getElementById('res-nak').innerText = data.planetary_positions.Moon.nakshatra;
        document.getElementById('res-pada').innerText = data.planetary_positions.Moon.pada;
        document.getElementById('res-syl').innerText = data.planetary_positions.Moon.syllable;

        // Coordinates for the 12 houses in a 400x400 North Indian Chart
        const houseCoords = {
            1: {x: 200, y: 100, sx: 200, sy: 180},
            2: {x: 100, y: 50, sx: 180, sy: 20},
            3: {x: 50, y: 100, sx: 20, sy: 180},
            4: {x: 100, y: 200, sx: 180, sy: 200},
            5: {x: 50, y: 300, sx: 20, sy: 220},
            6: {x: 100, y: 350, sx: 180, sy: 380},
            7: {x: 200, y: 300, sx: 200, sy: 220},
            8: {x: 300, y: 350, sx: 220, sy: 380},
            9: {x: 350, y: 300, sx: 380, sy: 220},
            10: {x: 300, y: 200, sx: 220, sy: 200},
            11: {x: 350, y: 100, sx: 380, sy: 180},
            12: {x: 300, y: 50, sx: 220, sy: 20}
        };

        const svg = document.getElementById('svg-chart');
        
        // Clear previous text
        svg.querySelectorAll('text').forEach(e => e.remove());

        const chart = data.chart_houses;
        
        for (let i = 1; i <= 12; i++) {
            const h = chart[i];
            
            // Draw Sign Number
            const nepaliDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९', '१०', '११', '१२'];
            const signText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            signText.setAttribute("x", houseCoords[i].sx);
            signText.setAttribute("y", houseCoords[i].sy);
            signText.setAttribute("class", "k-sign");
            signText.textContent = nepaliDigits[h.sign];
            svg.appendChild(signText);

            // Draw Planets
            let planetsStr = h.planets.join(", ");
            if (i === 1) planetsStr = "लग्न" + (planetsStr ? ", " + planetsStr : "");
            
            if (planetsStr) {
                const pText = document.createElementNS("http://www.w3.org/2000/svg", "text");
                pText.setAttribute("x", houseCoords[i].x);
                pText.setAttribute("y", houseCoords[i].y);
                pText.setAttribute("class", i === 1 ? "k-text k-asc" : "k-text");
                
                // Splitting into multiple lines if too many planets
                const pList = planetsStr.split(", ");
                pList.forEach((p, idx) => {
                    const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspan.setAttribute("x", houseCoords[i].x);
                    tspan.setAttribute("dy", idx === 0 ? 0 : 16);
                    tspan.textContent = p;
                    pText.appendChild(tspan);
                });
                
                svg.appendChild(pText);
            }
        }
    }
</script>
